name: lumina_media
description: "A premium dark Sakura themed media player."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  video_player: ^2.10.1
  path_provider: ^2.1.2
  file_picker: ^11.0.2
  provider: ^6.1.2
  intl: ^0.19.0
  http: ^1.2.1
  dio: ^5.7.0
  crypto: ^3.0.3
  shimmer: ^3.0.0
  webview_flutter: ^4.10.0
  sqflite: ^2.3.2
  path: ^1.9.0
  fvp: ^0.35.2
  cached_network_image: ^3.4.1
  archive: ^4.0.9
  flutter_dotenv: ^5.1.0
  webview_windows: ^0.4.0
  pdfrx: ^2.2.24

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#131315"
  adaptive_icon_foreground: "assets/icon/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
    - assets/video/intro.mp4
    - assets/audio/menu_music.mp4
